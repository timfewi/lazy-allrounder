[text]
provider = "openrouter"
model = "qwen/qwen3.6-flash"

[stt]
provider = "openrouter"
model = "openai/whisper-large-v3-turbo"

# Known-good OpenRouter TTS combos:
#   model = "hexgrad/kokoro-82m"                voice = "af_heart" | "af_alloy"
#   model = "zyphra/zonos-v0.1-transformer"     voice = "american_female"
#   model = "x-ai/grok-voice-tts-1.0"           voice = "Eve"
[tts]
provider = "openrouter"
model = "hexgrad/kokoro-82m"
voice = "af_heart"

# Floating badge overlay (the GUI's default mode).
[overlay]
enabled = true
# One of: "top-left", "top-right", "bottom-left", "bottom-right"
corner = "bottom-right"

# Global hotkeys (X11/macOS/Windows; Wayland needs desktop-native shortcuts,
# see the README). An empty string disables a binding.
[hotkeys]
read = "super+s"
summarize = "super+w"
explain = "super+a"
ask = "super+shift+a"
dictate = "super+d"

# Secrets belong in environment variables, for example:
# OPENROUTER_API_KEY=...
