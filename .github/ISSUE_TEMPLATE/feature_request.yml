name: Feature request
description: Propose a new feature or improvement
title: "[feature]: "
labels:
  - kind/feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the suggested behavior.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Dependencies, tradeoffs, or relevant examples.
