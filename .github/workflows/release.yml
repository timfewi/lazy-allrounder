name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libdbus-1-dev \
            libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p lazy-allrounder-cli -p lazy-allrounder-gui

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          staging="lazy-allrounder-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$staging"
          cp target/${{ matrix.target }}/release/lazy-allrounder "$staging/"
          cp target/${{ matrix.target }}/release/lazy-allrounder-gui "$staging/"
          cp README.md LICENSE config.example.toml "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $staging = "lazy-allrounder-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/lazy-allrounder.exe" $staging
          Copy-Item "target/${{ matrix.target }}/release/lazy-allrounder-gui.exe" $staging
          Copy-Item README.md,LICENSE,config.example.toml $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

  installers:
    name: Installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            formats: deb,appimage
          - os: macos-latest
            formats: dmg
          - os: windows-latest
            formats: nsis
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libdbus-1-dev \
            libxkbcommon-dev \
            libfuse2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build installers
        run: cargo packager --release -p lazy-allrounder-gui --formats ${{ matrix.formats }} --out-dir dist

      - name: Upload installer assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
